name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t myapp .

    - name: Test with docker-compose
      run: |
        docker-compose up -d
        sleep 10
        curl -f http://localhost:8080
        docker-compose down